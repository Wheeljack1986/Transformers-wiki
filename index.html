<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Transformers Wiki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
    
<body>   
    <header>
        <img src="Logito.png" alt="Logito">
        <div class="vacio"></div>
        <nav>
            <a href="#principal">Principal</a>
            <a href="#lineas">Lineas</a>
            <a href="#peliculas">Peliculas</a>
            <a href="#series">Series</a>
            <a href="#videojuegos">Videojuegos</a>
            <a href="#comics">Comics</a>
        </nav>
    </header>
    
    <main>
        
        <article class="banner" id="principal">
            <img src="Logo.png" alt="Logo">   
        </article>

        <article class="lineas" id="lineas">
            <h1>Lineas</h1>
            <div class="lineas-contenido">
                <img src="titulos/ss.png" alt="Studio Series">
                <img src="titulos/wfc3.png" alt="Wfc">
                <img src="titulos/legacy.png" alt="lega">
                <img src="titulos/aotp.png" alt="aotp1">
            </div> 
        </article>

        <article class="peliculas" id="peliculas">
            <h1>Peliculas</h1>
            <div class="peliculas-conte">
                <img src="titulos/tm86.png" alt="tm866">
                <img src="titulos/bayformer.png" alt="bay">
                <img src="titulos/bayformer2.png" alt="bay2">
                <img src="titulos/bayformer3.png" alt="bay3">
                <img src="titulos/bayformer4.png" alt="bay4">
                <img src="titulos/bayformer5.png" alt="bay5">
                <img src="titulos/bumblebee.png" alt="bumble">
                <img src="titulos/rotb.png" alt="rise">
                <img src="titulos/tfo.png" alt="one">
            </div> 
        </article>

        <article class="series" id="series">
            <h1>Series</h1>
            <div class="serie-conte">
                <img src="titulos/gen1.png" alt="g1">
                <img src="titulos/beastw.png" alt="bw">
                <img src="titulos/beastmachine.png" alt="bm">
                <img src="titulos/trilotron.png" alt="ct">
                <img src="titulos/animated.png" alt="ani">
                <img src="titulos/tfprime.png" alt="prime">
                <img src="titulos/rescue.png" alt="rb">
                <img src="titulos/robots2015.png" alt="2015">
                <img src="titulos/cyberverse.png" alt="cyber">
                <img src="titulos/earthspark.png" alt="ep">
            </div> 
        </article>

        <article class="videojuegos" id="videojuegos">
            <h1>Videojuegos</h1>
            <div class="videoconte">
                <img src="titulos/wfc.png" alt="wf">
                <img src="titulos/foc.png" alt="fo">
                <img src="titulos/tfd.png" alt="dvas">
            </div>
        </article>

        <article class="comics" id="comics">
            <h1>Comics</h1>
            <div class="comicconte">
                <img src="titulos/tracomic.png" alt="tc">
                <img src="titulos/thetransd.png" alt="lostran">
                <img src="titulos/idwtransfor.png" alt="idw">
                <img src="titulos/mtmte.png" alt="rod">
                <img src="titulos/skybound.png" alt="sk">
            </div>
                
        </article>
    <footer id="info">
        (c) Todos los derechos pertenecen a Hasbro, Transformers, Pronto podras agregar mas informacion tu mismo!
    </footer>
</body>
</html>
